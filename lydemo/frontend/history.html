<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeBlanc — Run History</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f8f9fc; color: #1e293b; }

  .header { background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #0f172a; letter-spacing: 0.5px; }
  .header .tag { background: #0f172a; color: #ffffff; font-size: 11px; padding: 2px 8px; font-weight: 600; letter-spacing: 0.4px; border-radius: 4px; }
  .back-link { margin-left: auto; font-size: 12px; font-weight: 600; color: #0f172a; text-decoration: none; border: 1px solid #e2e8f0; padding: 6px 12px; border-radius: 6px; }
  .back-link:hover { background: #f8fafc; }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

  /* Controls bar */
  .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .search-input { background: #f8fafc; border: 1px solid #cbd5e1; color: #0f172a; padding: 8px 12px; font-size: 13px; font-family: inherit; outline: none; width: 280px; }
  .search-input:focus { border-color: #475569; }
  .search-input::placeholder { color: #94a3b8; }
  .filter-select { background: #f8fafc; border: 1px solid #cbd5e1; color: #0f172a; padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none; cursor: pointer; }
  .filter-select:focus { border-color: #475569; }
  .row-count { margin-left: auto; font-size: 12px; color: #64748b; }

  /* Table */
  .table-wrap { background: #ffffff; border: 1px solid #e2e8f0; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: #f1f5f9; }
  th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #475569; border-bottom: 1px solid #e2e8f0; white-space: nowrap; user-select: none; cursor: pointer; }
  th:hover { color: #0f172a; }
  th .sort-arrow { margin-left: 4px; color: #94a3b8; }
  th.sorted { color: #0f172a; }
  th.sorted .sort-arrow { color: #0f172a; }

  td { padding: 9px 14px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.expandable:hover { background: #f8fafc; cursor: pointer; }
  tr.expanded-row td { background: #f1f5f9; }

  /* Cell types */
  .cell-id { color: #94a3b8; font-size: 12px; width: 40px; }
  .cell-time { color: #64748b; font-size: 12px; white-space: nowrap; }
  .cell-prompt { max-width: 320px; }
  .prompt-text { color: #0f172a; }
  .prompt-truncated { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 320px; display: block; }
  .cell-model-gemini { color: #0f172a; font-weight: 600; }
  .cell-model-groq { color: #0f172a; font-weight: 600; }
  .cell-mode { color: #334155; }
  .cell-vulns { font-weight: 700; text-align: center; }
  .vuln-zero { color: #0f172a; }
  .vuln-nonzero { color: #0f172a; }

  /* Status badges */
  .badge { display: inline-block; padding: 2px 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; }
  .badge-clean { background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; }
  .badge-vuln { background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; }
  .badge-repaired { background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; }
  .badge-converge { background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; }

  .cwe-list { display: flex; gap: 4px; flex-wrap: wrap; }
  .cwe-chip { background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; font-size: 11px; padding: 1px 6px; font-weight: 600; }

  /* Expanded detail */
  .detail-panel { padding: 14px 16px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .detail-section-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 6px; }
  .vuln-item { background: #ffffff; border: 1px solid #cbd5e1; padding: 7px 12px; margin-bottom: 5px; font-size: 12px; }
  .vuln-cwe { color: #0f172a; font-weight: 700; margin-right: 6px; }
  .vuln-sev { color: #ffffff; background: #475569; padding: 2px 4px; border-radius: 4px; margin-right: 6px; font-size: 10px; text-transform: uppercase; font-weight: 600; }
  .vuln-msg { color: #0f172a; }
  .vuln-line { color: #64748b; font-size: 11px; margin-top: 2px; }
  .no-vulns { color: #0f172a; font-size: 12px; padding: 6px 0; }
  .code-preview { background: #1e1e1e; border: 1px solid #333; padding: 10px 14px; font-family: 'Consolas', monospace; font-size: 11.5px; line-height: 1.5; color: #d4d4d4; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }

  /* Loading / empty */
  .loading-msg { text-align: center; padding: 60px; color: #64748b; font-size: 14px; }
  .empty-msg { text-align: center; padding: 60px; color: #94a3b8; }
  .empty-msg h3 { font-size: 16px; color: #64748b; margin-bottom: 6px; }

  /* Stats panel */
  .stats-panel { background: #ffffff; border: 1px solid #e2e8f0; margin-bottom: 20px; }
  .stats-panel-header { padding: 12px 18px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: baseline; gap: 10px; }
  .stats-panel-header h2 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #0f172a; }
  .stats-panel-header .stats-note { font-size: 11px; color: #94a3b8; }
  .stats-summary { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #e2e8f0; }
  .stats-model-block { padding: 14px 18px; }
  .stats-model-block:first-child { border-right: 1px solid #e2e8f0; }
  .stats-model-name { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
  .stats-model-name.gemini { color: #0f172a; }
  .stats-model-name.groq { color: #0f172a; }
  .stats-kpi-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .stats-kpi { background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px 14px; min-width: 100px; }
  .stats-kpi-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600; margin-bottom: 3px; }
  .stats-kpi-value { font-size: 20px; font-weight: 700; color: #0f172a; }
  .stats-kpi-value.good { color: #0f172a; }
  .stats-kpi-value.warn { color: #0f172a; }
  .stats-kpi-sub { font-size: 10px; color: #64748b; margin-top: 1px; }

  /* Per-prompt table */
  .breakdown-wrap { overflow-x: auto; }
  .breakdown-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .breakdown-table th { padding: 7px 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #475569; border-bottom: 1px solid #e2e8f0; background: #f1f5f9; white-space: nowrap; text-align: center; }
  .breakdown-table th.prompt-col { text-align: left; }
  .breakdown-table td { padding: 7px 12px; border-bottom: 1px solid #e2e8f0; text-align: center; vertical-align: middle; }
  .breakdown-table td.prompt-col { text-align: left; color: #0f172a; max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .breakdown-table tr:last-child td { border-bottom: none; }
  .breakdown-table .pid { color: #64748b; font-weight: 700; font-size: 11px; margin-right: 6px; }
  .num-high { color: #0f172a; font-weight: 700; }
  .num-mid  { color: #0f172a; font-weight: 700; }
  .num-zero { color: #0f172a; font-weight: 700; }
  .num-none { color: #94a3b8; }
  .arrow-sep { color: #94a3b8; margin: 0 3px; }
  .pct-badge { display: inline-block; padding: 1px 6px; font-size: 10px; font-weight: 700; }
  .pct-pos { background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; }
  .pct-neg { background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; }
  .pct-zero { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; }
  .col-group-gemini { background: #f8fafc; }
  .col-group-groq   { background: #ffffff; }
  .col-group-label  { font-size: 11px; font-weight: 700; letter-spacing: 0.3px; }
  .stats-no-data { padding: 24px; text-align: center; color: #94a3b8; font-size: 13px; }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const API = "http://localhost:5001/api";

/* ── Helpers ── */
function numCell(val) {
  if (val === null || val === undefined) return <span className="num-none">—</span>;
  if (val === 0) return <span className="num-zero">0</span>;
  if (val <= 2)  return <span className="num-mid">{val}</span>;
  return <span className="num-high">{val}</span>;
}

function pctBadge(pct) {
  if (pct === null || pct === undefined) return <span className="num-none">—</span>;
  if (pct > 0)  return <span className="pct-badge pct-pos">↓{pct}%</span>;
  if (pct < 0)  return <span className="pct-badge pct-neg">↑{Math.abs(pct)}%</span>;
  return <span className="pct-badge pct-zero">0%</span>;
}

/* ── Stats Panel ── */
function StatsPanel() {
  const [data, setData] = useState(null);
  const [open, setOpen] = useState(true);

  useEffect(() => {
    fetch(`${API}/stats`)
      .then(r => r.json())
      .then(res => { if (res.success) setData(res.data); })
      .catch(() => {});
  }, []);

  if (!data) return null;

  const { overall, by_prompt } = data;
  const hasData = by_prompt && by_prompt.length > 0;

  const kpi = (label, value, sub, good) => (
    <div className="stats-kpi">
      <div className="stats-kpi-label">{label}</div>
      <div className={`stats-kpi-value ${good === true ? "good" : good === false ? "warn" : ""}`}>{value ?? "—"}</div>
      {sub && <div className="stats-kpi-sub">{sub}</div>}
    </div>
  );

  return (
    <div className="stats-panel">
      <div className="stats-panel-header">
        <h2>Pipeline Effectiveness</h2>
        {hasData && <span className="stats-note">{by_prompt.length} prompt{by_prompt.length !== 1 ? "s" : ""} · latest run per prompt · plain=0 excluded from reduction %</span>}
        <span style={{marginLeft:"auto", fontSize:11, color:"#a08878", cursor:"pointer", userSelect:"none"}} onClick={() => setOpen(v => !v)}>
          {open ? "▲ collapse" : "▼ expand"}
        </span>
      </div>

      {!open ? null : !hasData ? (
        <div className="stats-no-data">No demo prompt runs yet — run the pipeline on the named prompts first.</div>
      ) : (
        <>
          {/* Summary KPIs per model */}
          <div className="stats-summary">
            {["gemini", "groq"].map(model => {
              const o = overall[model] || {};
              return (
                <div key={model} className="stats-model-block">
                  <div className={`stats-model-name ${model}`}>{model === "gemini" ? "Gemma 4 31B" : "Groq (Llama 3.3 70B)"}</div>
                  <div className="stats-kpi-row">
                    {kpi("Avg vulns plain",    o.plain_avg,    `${o.prompts_covered} prompts`)}
                    {kpi("Avg vulns enriched", o.enriched_avg, `${o.enriched_reduction_pct ?? "—"}% reduction`)}
                    {kpi("Avg vulns repaired", o.repair_avg,   `${o.repair_reduction_pct ?? "—"}% reduction`, o.repair_avg === 0 ? true : null)}
                    {kpi("Convergence",
                      o.convergence_rate !== null ? `${o.convergence_rate}%` : "—",
                      `${o.convergence_count ?? 0}/${o.total_repair_runs ?? 0} runs clean`,
                      o.convergence_rate >= 50 ? true : o.convergence_rate < 25 ? false : null
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Per-prompt breakdown */}
          <div className="breakdown-wrap">
            <table className="breakdown-table">
              <thead>
                <tr>
                  <th className="prompt-col" rowSpan={2}>Prompt</th>
                  <th className="col-group-gemini col-group-label" colSpan={4}>Gemma 4 31B</th>
                  <th className="col-group-groq col-group-label" colSpan={4}>Groq Llama 3.3</th>
                </tr>
                <tr>
                  <th className="col-group-gemini">Plain</th>
                  <th className="col-group-gemini">Enriched</th>
                  <th className="col-group-gemini">Repair</th>
                  <th className="col-group-gemini">↓ vs Plain</th>
                  <th className="col-group-groq">Plain</th>
                  <th className="col-group-groq">Enriched</th>
                  <th className="col-group-groq">Repair</th>
                  <th className="col-group-groq">↓ vs Plain</th>
                </tr>
              </thead>
              <tbody>
                {by_prompt.map(row => (
                  <tr key={row.prompt_id}>
                    <td className="prompt-col">
                      <span className="pid">{row.prompt_id}</span>
                      <span title={row.prompt_text}>{row.prompt_text.length > 55 ? row.prompt_text.slice(0, 55) + "…" : row.prompt_text}</span>
                    </td>
                    {["gemini", "groq"].map(model => {
                      const m = row[model] || {};
                      return [
                        <td key={`${model}-p`}>{numCell(m.plain)}</td>,
                        <td key={`${model}-e`}>{numCell(m.enriched)}</td>,
                        <td key={`${model}-r`}>{numCell(m.repair)}</td>,
                        <td key={`${model}-pct`}>{pctBadge(m.repair_reduction_pct)}</td>,
                      ];
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}

function formatTime(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  const date = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  const time = d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  return `${date} ${time}`;
}

function statusBadge(row) {
  if (row.final_status === "clean" && row.total_iterations > 0)
    return <span className="badge badge-repaired">REPAIRED</span>;
  if (row.final_status === "clean")
    return <span className="badge badge-clean">CLEAN</span>;
  if (row.final_status === "not_converged")
    return <span className="badge badge-converge">NO CONVERGE</span>;
  if (row.final_status === "not_repaired")
    return <span className="badge badge-vuln">NOT REPAIRED</span>;
  return <span className="badge badge-vuln">{row.final_status}</span>;
}

const COLUMNS = [
  { key: "id",            label: "#",           sortFn: (a, b) => a.id - b.id },
  { key: "timestamp",     label: "Time",        sortFn: (a, b) => a.timestamp > b.timestamp ? 1 : -1 },
  { key: "prompt_text",   label: "Prompt",      sortFn: (a, b) => a.prompt_text.localeCompare(b.prompt_text) },
  { key: "model",         label: "Model",       sortFn: (a, b) => a.model.localeCompare(b.model) },
  { key: "mode",          label: "Mode",        sortFn: (a, b) => a.mode.localeCompare(b.mode) },
  { key: "vuln_count",    label: "Vulns",       sortFn: (a, b) => a.vuln_count - b.vuln_count },
  { key: "final_status",  label: "Status",      sortFn: (a, b) => a.final_status.localeCompare(b.final_status) },
  { key: "matched_cwes",  label: "CWEs",        sortFn: (a, b) => (a.matched_cwes||[]).length - (b.matched_cwes||[]).length },
  { key: "total_iterations", label: "Iters",   sortFn: (a, b) => a.total_iterations - b.total_iterations },
];

function DetailPanel({ row }) {
  const vulns = row.scan_results || [];
  const code = row.clean_code || row.generated_code || "";
  const repairResult = row.repair_result || {};
  const iterations = repairResult.iterations || [];

  return (
    <div className="detail-panel">
      <div className="detail-grid">
        <div>
          <div className="detail-section-label">Vulnerabilities ({vulns.length})</div>
          {vulns.length === 0
            ? <div className="no-vulns">No vulnerabilities found</div>
            : vulns.map((v, i) => (
              <div key={i} className="vuln-item">
                <span className="vuln-cwe">{(v.cwes||[]).join(", ")}</span>
                <span className="vuln-sev">{v.severity}</span>
                <span className="vuln-msg">{v.message}</span>
                <div className="vuln-line">Line {v.line} · {v.tool}</div>
              </div>
            ))
          }
          {iterations.length > 0 && (
            <div style={{marginTop: 10}}>
              <div className="detail-section-label">Repair Iterations</div>
              {iterations.map((it, i) => (
                <div key={i} style={{fontSize:12, padding:'3px 0', color: it.vulns_after === 0 ? '#2e6b44' : '#8c3228'}}>
                  Iteration {it.iteration}: {it.vulns_before} → {it.vulns_after} vulns
                </div>
              ))}
            </div>
          )}
        </div>
        <div>
          <div className="detail-section-label">Final Code</div>
          <div className="code-preview">{(repairResult.final_code || code || "—")}</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [rows, setRows] = useState(null);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState("");
  const [modelFilter, setModelFilter] = useState("all");
  const [modeFilter, setModeFilter] = useState("all");
  const [sortCol, setSortCol] = useState("id");
  const [sortDir, setSortDir] = useState(-1); // -1 = desc, 1 = asc
  const [expandedId, setExpandedId] = useState(null);

  useEffect(() => {
    fetch(`${API}/history`)
      .then(r => r.json())
      .then(res => {
        if (res.success) setRows(res.data);
        else setError(res.error || "Failed to load history");
      })
      .catch(e => setError(e.message));
  }, []);

  const handleSort = (key) => {
    if (sortCol === key) {
      setSortDir(d => -d);
    } else {
      setSortCol(key);
      setSortDir(-1);
    }
  };

  const filtered = useMemo(() => {
    if (!rows) return [];
    let out = rows;
    if (search.trim()) {
      const q = search.toLowerCase();
      out = out.filter(r =>
        r.prompt_text.toLowerCase().includes(q) ||
        (r.matched_cwes || []).some(c => c.toLowerCase().includes(q)) ||
        r.model.toLowerCase().includes(q) ||
        r.mode.toLowerCase().includes(q) ||
        r.final_status.toLowerCase().includes(q)
      );
    }
    if (modelFilter !== "all") out = out.filter(r => r.model === modelFilter);
    if (modeFilter !== "all") out = out.filter(r => r.mode === modeFilter);
    const col = COLUMNS.find(c => c.key === sortCol);
    if (col) out = [...out].sort((a, b) => sortDir * col.sortFn(a, b));
    return out;
  }, [rows, search, modelFilter, modeFilter, sortCol, sortDir]);

  const modeLabel = { plain: "Plain", enriched: "Enriched", enriched_repair: "Enriched + Repair" };

  if (error) return (
    <div>
      <div className="header"><h1>PIPELINE</h1><span className="tag">HISTORY</span><a className="back-link" href="index.html">← Back</a></div>
      <div className="container"><div className="loading-msg" style={{color:'#8c3228'}}>Error loading history: {error}</div></div>
    </div>
  );

  return (
    <div>
      <div className="header">
        <h1>PIPELINE</h1>
        <span className="tag">HISTORY</span>
        <a className="back-link" href="index.html">← Back</a>
      </div>

      <div className="container">
        <StatsPanel />
        <div className="controls">
          <input
            className="search-input"
            placeholder="Search prompts, CWEs, status..."
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
          <select className="filter-select" value={modelFilter} onChange={e => setModelFilter(e.target.value)}>
            <option value="all">All models</option>
            <option value="gemini">Gemini</option>
            <option value="groq">Groq</option>
          </select>
          <select className="filter-select" value={modeFilter} onChange={e => setModeFilter(e.target.value)}>
            <option value="all">All modes</option>
            <option value="plain">Plain</option>
            <option value="enriched">Enriched</option>
            <option value="enriched_repair">Enriched + Repair</option>
          </select>
          {rows && <span className="row-count">{filtered.length} of {rows.length} runs</span>}
        </div>

        <div className="table-wrap">
          {rows === null ? (
            <div className="loading-msg">Loading history...</div>
          ) : rows.length === 0 ? (
            <div className="empty-msg"><h3>No runs yet</h3><p>Run the pipeline from the main page first.</p></div>
          ) : (
            <table>
              <thead>
                <tr>
                  {COLUMNS.map(col => (
                    <th key={col.key} className={sortCol === col.key ? "sorted" : ""} onClick={() => handleSort(col.key)}>
                      {col.label}
                      <span className="sort-arrow">{sortCol === col.key ? (sortDir === 1 ? "↑" : "↓") : "↕"}</span>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(row => [
                  <tr
                    key={row.id}
                    className="expandable"
                    onClick={() => setExpandedId(expandedId === row.id ? null : row.id)}
                  >
                    <td className="cell-id">{row.id}</td>
                    <td className="cell-time">{formatTime(row.timestamp)}</td>
                    <td className="cell-prompt">
                      <span className="prompt-truncated" title={row.prompt_text}>{row.prompt_text}</span>
                    </td>
                    <td className={`cell-model-${row.model}`}>{row.model === "gemini" ? "Gemini" : "Groq"}</td>
                    <td className="cell-mode">{modeLabel[row.mode] || row.mode}</td>
                    <td className="cell-vulns">
                      <span className={row.vuln_count === 0 ? "vuln-zero" : "vuln-nonzero"}>{row.vuln_count}</span>
                    </td>
                    <td>{statusBadge(row)}</td>
                    <td>
                      {(row.matched_cwes || []).length > 0 ? (
                        <div className="cwe-list">
                          {row.matched_cwes.map((c, i) => <span key={i} className="cwe-chip">{c}</span>)}
                        </div>
                      ) : <span style={{color:'#c0a898', fontSize:12}}>—</span>}
                    </td>
                    <td style={{textAlign:'center', color:'#a08878'}}>{row.total_iterations || "—"}</td>
                  </tr>,
                  expandedId === row.id && (
                    <tr key={`${row.id}-detail`} className="expanded-row">
                      <td colSpan={COLUMNS.length}>
                        <DetailPanel row={row} />
                      </td>
                    </tr>
                  )
                ])}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
